<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechCorp AI · Phi-3.5 Financial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Décor d'arrière-plan -->
  <div class="bg-decor" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="app">
    <!-- ───────────── Sidebar ───────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-orb">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M4 16l5-5 4 4 7-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20" cy="7" r="2" fill="white"/>
          </svg>
        </div>
        <div class="brand-text">
          <strong>TechCorp&nbsp;AI</strong>
          <span>Financial Intelligence</span>
        </div>
      </div>

      <button class="new-chat" onclick="newConversation()">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none">
          <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span data-i18n="new_chat">Nouvelle conversation</span>
      </button>

      <div class="history-label" data-i18n="history">Historique</div>
      <div class="history" id="historyList"></div>

      <div class="sidebar-foot">
        <button class="ghost-btn" onclick="toggleSettings()">
          <svg viewBox="0 0 18 18" width="16" height="16" fill="none">
            <circle cx="9" cy="9" r="2.6" stroke="currentColor" stroke-width="1.6"/>
            <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.6 3.6l1.4 1.4M13 13l1.4 1.4M3.6 14.4L5 13M13 5l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span data-i18n="settings">Paramètres</span>
        </button>
        <div class="status-pill" id="statusPill">
          <span class="dot connecting" id="statusDot"></span>
          <span id="statusText" data-i18n="status_connecting">Connexion…</span>
        </div>
      </div>
    </aside>

    <!-- ───────────── Chat ───────────── -->
    <main class="chat">
      <header class="topbar">
        <button class="icon-btn mobile-only" onclick="toggleSidebar()" title="Menu">
          <svg viewBox="0 0 18 18" width="18" height="18" fill="none"><path d="M3 5h12M3 9h12M3 13h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-title">
          <h1>Phi-3.5 Financial</h1>
          <span class="mode-badge" id="modeBadge">···</span>
        </div>
        <div class="topbar-actions">
          <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Language">FR</button>
          <button class="icon-btn" onclick="exportChat()" data-i18n-title="export" title="Exporter la conversation">
            <svg viewBox="0 0 18 18" width="17" height="17" fill="none"><path d="M9 2.5v8M5.5 7L9 10.5 12.5 7M3.5 14.5h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" onclick="clearChat()" data-i18n-title="clear" title="Effacer">
            <svg viewBox="0 0 18 18" width="17" height="17" fill="none"><path d="M3.5 5h11M7 5V3.2h4V5M13 5l-.7 9.3H5.7L5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </header>

      <div class="messages" id="messages">
        <!-- Écran d'accueil -->
        <section class="hero" id="hero">
          <div class="hero-orb">
            <svg viewBox="0 0 24 24" width="34" height="34" fill="none">
              <path d="M4 16l5-5 4 4 7-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="20" cy="7" r="2" fill="white"/>
            </svg>
          </div>
          <h2 id="heroTitle" data-i18n="hero_title">Bonjour 👋 Je suis votre <span class="grad">analyste financier</span></h2>
          <p id="heroSub" data-i18n="hero_sub">Spécialisé en finance, valorisation et stratégie d'entreprise pour TechCorp Industries. Par où commençons-nous ?</p>

          <div class="cards">
            <button class="card" onclick="sendSuggestion(this)" data-q="Explique-moi les 3 composantes d'un bilan financier.">
              <div class="card-ic ic-blue">
                <svg viewBox="0 0 20 20" width="18" height="18" fill="none"><path d="M3 17h14M5 17V9M9 17V5M13 17v-7M17 17V3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              </div>
              <div><strong data-i18n="card1_t">Analyse de bilan</strong><span data-i18n="card1_s">Actif, passif & capitaux propres</span></div>
            </button>
            <button class="card" onclick="sendSuggestion(this)" data-q="Quelle stratégie d'investissement pour diversifier un portefeuille ?">
              <div class="card-ic ic-violet">
                <svg viewBox="0 0 20 20" width="18" height="18" fill="none"><path d="M10 2v16M10 2l5 4M10 2L5 6M4 12c0 3 2.7 5 6 5s6-2 6-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div><strong data-i18n="card2_t">Stratégie d'investissement</strong><span data-i18n="card2_s">Diversification & allocation</span></div>
            </button>
            <button class="card" onclick="sendSuggestion(this)" data-q="Comment évaluer la valorisation d'une startup ?">
              <div class="card-ic ic-emerald">
                <svg viewBox="0 0 20 20" width="18" height="18" fill="none"><path d="M10 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4L10 14.3 5.2 16.7l.9-5.4L2.2 7.7l5.4-.8L10 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
              </div>
              <div><strong data-i18n="card3_t">Valorisation startup</strong><span data-i18n="card3_s">DCF, multiples & Berkus</span></div>
            </button>
            <button class="card" onclick="sendSuggestion(this)" data-q="Quels sont les principaux risques financiers et comment les gérer ?">
              <div class="card-ic ic-amber">
                <svg viewBox="0 0 20 20" width="18" height="18" fill="none"><path d="M10 2.5l7 12.5H3L10 2.5z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 8v3.5M10 13.5v.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
              </div>
              <div><strong data-i18n="card4_t">Gestion des risques</strong><span data-i18n="card4_s">VaR, volatilité & couverture</span></div>
            </button>
          </div>
        </section>
      </div>

      <!-- Composer -->
      <div class="composer">
        <div class="composer-box" id="composerBox">
          <textarea id="userInput" rows="1" data-i18n-ph="placeholder" placeholder="Posez votre question financière…"
            onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
          <button class="send" id="sendBtn" onclick="onSendClick()" title="Envoyer">
            <svg id="sendIcon" viewBox="0 0 20 20" width="18" height="18" fill="none"><path d="M3.5 10h13M11 4.5L16.5 10 11 15.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <svg id="stopIcon" viewBox="0 0 20 20" width="16" height="16" fill="none" style="display:none"><rect x="5" y="5" width="10" height="10" rx="2" fill="white"/></svg>
          </button>
        </div>
        <p class="composer-hint" data-i18n="hint"><kbd>Entrée</kbd> pour envoyer · <kbd>Maj</kbd>+<kbd>Entrée</kbd> nouvelle ligne</p>
      </div>
    </main>
  </div>

  <!-- ───────────── Modal Paramètres ───────────── -->
  <div class="overlay" id="settingsModal" onclick="closeSettings(event)">
    <div class="modal">
      <div class="modal-head">
        <h3 data-i18n="settings">Paramètres</h3>
        <button class="icon-btn" onclick="toggleSettings()">
          <svg viewBox="0 0 18 18" width="16" height="16" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label data-i18n="f_server">Serveur d'inférence</label>
          <select id="serverType" onchange="updateServerUrl()">
            <option value="auto">Auto (ce serveur · port 8080)</option>
            <option value="ollama">Ollama direct (11434)</option>
            <option value="triton">Triton (8000)</option>
            <option value="custom">Personnalisé</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="f_url">URL de l'API</label>
          <input type="text" id="serverUrl" />
        </div>
        <div class="field">
          <label data-i18n="f_model">Modèle</label>
          <input type="text" id="modelNameInput" value="phi3.5-financial" />
        </div>
        <div class="field">
          <label data-i18n="f_apikey">Clé API (optionnelle)</label>
          <input type="password" id="apiKeyInput" placeholder="X-API-Key (si activée côté serveur)" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Température · <span id="tempVal">0.7</span></label>
            <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"
              oninput="document.getElementById('tempVal').textContent=this.value" />
          </div>
          <div class="field">
            <label data-i18n="f_tokens">Tokens max</label>
            <input type="number" id="maxTokens" value="2048" min="128" max="8192" />
          </div>
        </div>
        <div class="field">
          <label data-i18n="f_system">Prompt système</label>
          <textarea id="systemPrompt" rows="3">Tu es Phi-3.5-Financial, un assistant expert en finance et business pour TechCorp Industries. Tu réponds en français de manière précise, structurée et professionnelle.</textarea>
        </div>
        <div id="testResult" class="test-result"></div>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="testConnection()" data-i18n="f_test">Tester la connexion</button>
          <button class="btn-grad" onclick="saveSettings()" data-i18n="f_save">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
