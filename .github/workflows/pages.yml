name: Deploy site to GitHub Pages

# Déploie l'interface (frontend/) sur GitHub Pages → lien public, sans install.
# Note : seul le mode DÉMO (cerveau intégré côté navigateur) fonctionne en
# ligne. Le vrai modèle Phi-3.5 via Ollama nécessite un serveur (local/cloud).

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4
