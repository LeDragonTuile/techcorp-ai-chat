# ── TechCorp AI — orchestration Ollama + Backend ──
# Démarrage :  docker compose up -d
# Interface  :  http://localhost:8080
#
# Au premier lancement, charger le modèle dans le conteneur Ollama :
#   docker compose exec ollama ollama pull phi3.5
#   docker compose exec ollama ollama create phi3.5-financial -f /models/Modelfile
services:
  ollama:
    image: ollama/ollama:latest
    container_name: techcorp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./models/phi3_financial:/models    # accès au Modelfile
    restart: unless-stopped
    # Décommenter pour activer le GPU NVIDIA :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: .
    container_name: techcorp-backend
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=phi3.5-financial
      # - API_KEY=change-me        # décommenter pour exiger une clé API
      # - RATE_LIMIT=30
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
